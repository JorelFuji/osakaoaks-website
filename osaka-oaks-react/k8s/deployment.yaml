apiVersion: apps/v1
kind: Deployment
metadata:
  name: osaka-oaks-web
  namespace: osaka-oaks-prod
  labels:
    app: osaka-oaks
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: osaka-oaks
      component: frontend
  template:
    metadata:
      labels:
        app: osaka-oaks
        component: frontend
    spec:
      containers:
      - name: web
        image: registry.osakaoaks.org/osaka-oaks-web:latest
        ports:
        - containerPort: 80
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        env:
        - name: NODE_ENV
          value: "production"
      imagePullSecrets:
      - name: regcred
---
apiVersion: v1
kind: Service
metadata:
  name: osaka-oaks-web-service
  namespace: osaka-oaks-prod
spec:
  selector:
    app: osaka-oaks
    component: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: osaka-oaks-web-hpa
  namespace: osaka-oaks-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: osaka-oaks-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
