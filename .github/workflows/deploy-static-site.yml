name: 🚀 Deploy Static Website (No PHP)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /home/osakuqbj/public_html
  BACKUP_PATH: /home/osakuqbj/backups/prod

jobs:
  # Security Scanning
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for sensitive data
        run: |
          echo "🔍 Scanning for exposed secrets..."
          if grep -r "password\|secret\|api_key\|private_key" --exclude-dir=.git --exclude="*.md" --exclude="*.yml" .; then
            echo "⚠️ Warning: Potential sensitive data found"
          else
            echo "✅ No exposed secrets"
          fi

      - name: Check file permissions
        run: |
          echo "🔍 Checking permissions..."
          find . -type f -perm /o+w -not -path "./.git/*" || echo "✅ No world-writable files"

  # Build & Package
  build:
    name: 🔨 Build & Package
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Create build info
        run: |
          mkdir -p build-artifacts
          cat > build-artifacts/build-info.json << EOF
          {
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "actor": "${{ github.actor }}",
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "workflow": "${{ github.workflow }}"
          }
          EOF

      - name: Create deployment package
        run: |
          cd website
          tar -czf ../build-artifacts/website-${{ github.sha }}.tar.gz *
          echo "✅ Package created"
          ls -lh ../build-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: website-build-${{ github.sha }}
          path: build-artifacts/
          retention-days: 30

  # Backup Files
  backup:
    name: 💾 Backup Current Site
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Create pre-deployment backup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_FILE="${{ env.BACKUP_PATH }}/backup-$TIMESTAMP.tar.gz"
            
            mkdir -p "${{ env.BACKUP_PATH }}"
            
            echo "💾 Creating backup..."
            cd "${{ env.DEPLOY_PATH }}"
            tar -czf "$BACKUP_FILE" \
              --exclude='*.log' \
              --exclude='*.tmp' \
              . 2>/dev/null || true
            
            if [ -f "$BACKUP_FILE" ]; then
              SIZE=$(du -sh "$BACKUP_FILE" | cut -f1)
              echo "✅ Backup created: $SIZE"
            fi
            
            # Keep only last 10 backups
            cd "${{ env.BACKUP_PATH }}"
            ls -t *.tar.gz 2>/dev/null | tail -n +11 | xargs -r rm
            echo "🧹 Old backups cleaned"

  # Deploy
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: backup
    environment:
      name: production
      url: https://osakaoaks.org
    steps:
      - uses: actions/checkout@v4

      - name: Deploy website files
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "🚀 Deploying website..."
            
            cd "${{ env.DEPLOY_PATH }}"
            
            # Use Git to deploy
            if [ -d ".git" ]; then
              echo "📥 Pulling latest changes..."
              git fetch origin main
              git reset --hard origin/main
            else
              echo "⚠️ Git not initialized"
            fi
            
            # Deploy only website folder contents
            if [ -d "website" ]; then
              echo "📂 Copying website files..."
              cp -r website/* .
            fi
            
            # Set secure permissions
            echo "🔐 Setting permissions..."
            find . -type f -exec chmod 644 {} \;
            find . -type d -exec chmod 755 {} \;
            chmod 644 .htaccess 2>/dev/null || true
            
            # Create deployment marker
            echo "${{ github.sha }}" > .deploy-version
            echo "$(date -u)" > .deploy-timestamp
            
            echo "✅ Deployment complete!"

  # Verify
  verify:
    name: ✅ Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check website status
        run: |
          echo "🔍 Checking website..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://osakaoaks.org)
          TIME=$(curl -s -o /dev/null -w "%{time_total}" https://osakaoaks.org)
          
          echo "HTTP Status: $STATUS"
          echo "Response Time: ${TIME}s"
          
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ]; then
            echo "✅ Website is live!"
          else
            echo "❌ Website check failed!"
            exit 1
          fi

      - name: Verify deployment version
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd "${{ env.DEPLOY_PATH }}"
            DEPLOYED=$(cat .deploy-version 2>/dev/null || echo "unknown")
            echo "Deployed version: $DEPLOYED"
            echo "Expected version: ${{ github.sha }}"
            
            if [ "$DEPLOYED" = "${{ github.sha }}" ]; then
              echo "✅ Version verified!"
            else
              echo "⚠️ Version mismatch (may be first deploy)"
            fi

  # Summary
  summary:
    name: 📢 Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy, verify]
    if: always()
    steps:
      - name: Create summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.deploy.result }}" = "success" ] && [ "${{ needs.verify.result }}" = "success" ]; then
            echo "✅ **Status**: Success" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Status**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://osakaoaks.org" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Features" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Static HTML/CSS/JS" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No PHP required" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ FormSubmit.co for contact form" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Automated backups" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ HTTPS enabled" >> $GITHUB_STEP_SUMMARY
